<summary>Открыть код</summary>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мой автомобиль</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1115">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:system-ui;background:#000;color:#fff}
header{display:flex;gap:6px;padding:10px;background:rgba(0,0,0,.7);position:sticky;top:0;z-index:10}
header button{background:#222;color:#fff;border:0;padding:8px 12px;border-radius:8px}
header button.active{background:#4caf50}
section{display:none;min-height:100vh;padding:16px;background-size:cover;background-position:center;position:relative}
section.active{display:block}
section::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45)}
section>*{position:relative;z-index:1}
.card{background:rgba(20,20,20,.85);padding:12px;border-radius:12px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:0}
.small{font-size:14px;opacity:.8}
.warn{background:#6b5500}

#car{background-image:url("images/bg-car.jpg")}
#fuel{background-image:url("images/bg-fuel.jpg")}
#service{background-image:url("images/bg-service.jpg")}
#rules{background-image:url("images/bg-rules.jpg")}
#stats{background-image:url("images/bg-stats.jpg")}
</style>
</head>

<body>

<header>
<button onclick="show('car')" class="active">🚗 Авто</button>
<button onclick="show('fuel')">⛽ Топливо</button>
<button onclick="show('service')">🛠 Сервис</button>
<button onclick="show('rules')">🧩 Регламент</button>
<button onclick="show('stats')">📊 Итоги</button>
</header>

<section id="car" class="active">
<div class="card">
<input id="brand" placeholder="Марка">
<input id="model" placeholder="Модель">
<input id="startKm" type="number" placeholder="Начальный пробег">
<button onclick="saveCar()">Сохранить</button>
</div>
</section>

<section id="fuel">
<div class="card">
<input id="fuelKm" type="number" placeholder="Пробег">
<input id="fuelLiters" type="number" placeholder="Литры">
<input id="fuelCost" type="number" placeholder="Стоимость">
<button onclick="addFuel()">Добавить</button>
</div>
<div id="fuelList"></div>
</section>

<section id="service">
<div class="card">
<input id="srvKm" type="number" placeholder="Пробег">
<input id="srvDesc" placeholder="Описание работ">
<input id="srvCost" type="number" placeholder="Стоимость">
<button onclick="addService()">Добавить</button>
</div>
<div id="serviceList"></div>
</section>

<section id="rules">
<div class="card">
<input id="ruleName" placeholder="Узел">
<input id="ruleKm" type="number" placeholder="Интервал, км">
<button onclick="addRule()">Добавить</button>
</div>
<div id="rulesList"></div>
</section>

<section id="stats">
<div class="card">
<canvas id="chart"></canvas>
<div id="statsContent"></div>
<button onclick="exportPDF()">📄 PDF отчёт</button>
<button onclick="exportJSON()">☁️ Сохранить в iCloud</button>
<input type="file" onchange="importJSON(event)">
</div>
</section>

<script>
const KEY='carAppFinal';
let data=JSON.parse(localStorage.getItem(KEY))||{car:{},fuel:[],service:[],rules:[]};

function save(){localStorage.setItem(KEY,JSON.stringify(data));render()}
function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
event.target.classList.add('active');
}

function saveCar(){data.car={brand:brand.value,model:model.value,startKm:+startKm.value};save()}
function loadCar(){brand.value=data.car.brand||'';model.value=data.car.model||'';startKm.value=data.car.startKm||''}

function addFuel(){
data.fuel.push({km:+fuelKm.value,liters:+fuelLiters.value,cost:+fuelCost.value});
fuelKm.value=fuelLiters.value=fuelCost.value='';
save();
}
function delFuel(i){data.fuel.splice(i,1);save();}

function addService(){
data.service.push({km:+srvKm.value,desc:srvDesc.value,cost:+srvCost.value});
srvKm.value=srvDesc.value=srvCost.value='';
save();
}
function delService(i){data.service.splice(i,1);save();}

function addRule(){data.rules.push({name:ruleName.value,km:+ruleKm.value});ruleName.value=ruleKm.value='';save();}

function exportJSON(){
download(JSON.stringify(data,null,2),'car-sync.json')
}
function importJSON(e){
const r=new FileReader();
r.onload=()=>{data=JSON.parse(r.result);save()}
r.readAsText(e.target.files[0])
}
function download(t,n){
const a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([t]));
a.download=n;a.click()
}

function exportPDF(){
const { jsPDF } = window.jspdf;
const pdf=new jsPDF();
let y=10;
pdf.text(`Авто: ${data.car.brand||''} ${data.car.model||''}`,10,y); y+=10;

pdf.text('Топливо:',10,y); y+=8;
data.fuel.forEach(f=>{
pdf.text(`${f.km} км | ${f.liters} л | ${f.cost} ₽`,10,y); y+=7;
});

y+=5;
pdf.text('Сервис:',10,y); y+=8;
data.service.forEach(s=>{
pdf.text(`${s.km} км | ${s.desc} | ${s.cost} ₽`,10,y); y+=7;
});

pdf.save('car-report.pdf');
}

let chart;
function render(){
loadCar();

fuelList.innerHTML=data.fuel.map((f,i)=>`
<div class="card row">
<div>${f.km} км • ${f.liters} л • ${f.cost} ₽</div>
<button onclick="delFuel(${i})">🗑</button>
</div>`).join('');

serviceList.innerHTML=data.service.map((s,i)=>`
<div class="card row">
<div>${s.km} км • ${s.desc} • ${s.cost} ₽</div>
<button onclick="delService(${i})">🗑</button>
</div>`).join('');

const fuelSum=data.fuel.reduce((a,b)=>a+b.cost,0);
const serviceSum=data.service.reduce((a,b)=>a+b.cost,0);
const total=fuelSum+serviceSum;

statsContent.innerHTML=`<p>Всего расходов: ${total} ₽</p>`;

if(chart)chart.destroy();
chart=new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{labels:['Топливо','Сервис'],datasets:[{data:[fuelSum,serviceSum]}]}
});
}
render();

if('serviceWorker'in navigator){
navigator.serviceWorker.register('service-worker.js')
}
</script>

</body>
</html>

</details>
