<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Control PRO v13</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#111;color:#fff}
nav{display:flex;background:#000;position:sticky;top:0;z-index:10}
nav button{flex:1;padding:14px;background:#000;color:#fff;border:none;font-weight:600}
nav button.active{background:#1f1f1f;border-radius:10px}
.section{padding:15px;padding-bottom:80px}
input,button,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none}
input,select{background:#222;color:#fff}
button.primary{background:#0a84ff;color:#fff}
.card,.stat{background:#1a1a1a;padding:12px;margin:10px 0;border-radius:12px}
canvas{background:#fff;border-radius:12px;margin-top:20px;max-height:320px}
</style>
</head>
<body>

<nav>
<button onclick="tab('fuel')" id="t-fuel">Топливо</button>
<button onclick="tab('summary')" id="t-summary">Итоги</button>
</nav>

<div id="content"></div>

<script>
const KEY="auto_v13";
let state=JSON.parse(localStorage.getItem(KEY))||{fuel:[]};
let current="fuel";
let pieChart,lineChart;

function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function id(){return crypto.randomUUID()}
function num(v){return Number(v)||0}

function tab(name){
current=name;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("t-"+name).classList.add("active");
render();
}

/* FUEL */
function renderFuel(){
content.innerHTML=`
<div class="section">
<input type="date" id="fdate">
<input type="number" id="fkm" placeholder="Пробег">
<input type="number" id="fliters" placeholder="Литры">
<input type="number" id="fprice" placeholder="Сумма">
<button class="primary" onclick="addFuel()">Добавить</button>
<div id="list"></div>
</div>`;

list.innerHTML=state.fuel
.sort((a,b)=>new Date(b.date)-new Date(a.date))
.map(f=>`
<div class="card">
<b>${f.date}</b><br>
${f.km} км — ${f.liters} л — ${f.price} ₽
</div>`).join("");
}

function addFuel(){
if(!fdate.value||!fkm.value||!fliters.value||!fprice.value)return;
state.fuel.push({id:id(),date:fdate.value,km:num(fkm.value),liters:num(fliters.value),price:num(fprice.value)});
save();renderFuel();
}

/* SUMMARY */
function renderSummary(){

let sorted=[...state.fuel].sort((a,b)=>new Date(a.date)-new Date(b.date));

let consumption=[];
let labels=[];

for(let i=1;i<sorted.length;i++){
let d=sorted[i].km-sorted[i-1].km;
if(d>0){
let c=(sorted[i].liters/d*100);
consumption.push(Number(c.toFixed(2)));
labels.push(sorted[i].date);
}
}

let totalCost=sorted.reduce((a,b)=>a+b.price,0);
let totalKm=sorted.length>1 ? sorted[sorted.length-1].km-sorted[0].km : 0;

let avg=consumption.length?
(consumption.reduce((a,b)=>a+b,0)/consumption.length).toFixed(2):null;

let costPerKm=totalKm>0?(totalCost/totalKm).toFixed(2):null;

content.innerHTML=`
<div class="section">
<div class="stat">Общие расходы: ${totalCost} ₽</div>
<div class="stat">Средний расход: ${avg?avg+" л/100км":"Недостаточно данных"}</div>
<div class="stat">Стоимость 1 км: ${costPerKm?costPerKm+" ₽":"Недостаточно данных"}</div>
<canvas id="lineChart"></canvas>
</div>`;

if(lineChart)lineChart.destroy();

if(consumption.length){
lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:labels,
datasets:[{label:"Расход (л/100км)",data:consumption,tension:0.3}]
}
});
}
}

function render(){
if(current==="fuel")renderFuel();
if(current==="summary")renderSummary();
}

tab("fuel");
</script>
</body>
</html>
