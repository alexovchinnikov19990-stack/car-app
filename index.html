<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auto Control PRO v17</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{margin:0;font-family:-apple-system;background:#111;color:#fff}
nav{display:flex;background:#000;position:sticky;top:0;z-index:10}
nav button{flex:1;padding:14px 6px;background:#000;color:#fff;border:none;font-weight:600;font-size:13px}
nav button.active{background:#1f1f1f;border-radius:10px}
.header{padding:20px;font-size:24px;font-weight:700}
.section{padding:15px;padding-bottom:80px}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;font-size:16px}
input{background:#222;color:#fff}
button.primary{background:#0a84ff;color:#fff}
.card,.stat{background:#1a1a1a;padding:12px;margin:10px 0;border-radius:12px}
.backup-item{background:#222;padding:10px;margin-top:6px;border-radius:10px}
.small{font-size:12px;opacity:.6}
.debug{background:#330000;border:1px solid #ff4444;padding:10px;border-radius:10px;margin-top:10px;font-size:12px}
</style>
</head>
<body>

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('fuel')" id="tab-fuel">Топливо</button>
<button onclick="switchTab('service')" id="tab-service">Сервис</button>
<button onclick="switchTab('other')" id="tab-other">Прочее</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<div id="content"></div>

<script>
const STORAGE_KEY="auto_v15_debug";
const BACKUP_KEY="auto_v15_debug_backups";
const MAX_BACKUPS=5;

function safeParse(key){
try{return JSON.parse(localStorage.getItem(key))}
catch{return null}
}

let state=safeParse(STORAGE_KEY);

if(!state){
state={
meta:{version:17,debug:false},
auto:{carName:"Belgee X50"},
fuel:[],
service:[],
other:[]
};
}

/* ================= BACKUP SYSTEM ================= */

function createBackup(){
let backups=safeParse(BACKUP_KEY)||[];
backups.unshift({
time:Date.now(),
data:JSON.parse(JSON.stringify(state))
});
if(backups.length>MAX_BACKUPS) backups=backups.slice(0,MAX_BACKUPS);
localStorage.setItem(BACKUP_KEY,JSON.stringify(backups));
}

function save(){
createBackup();
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function restoreBackup(i){
let backups=safeParse(BACKUP_KEY)||[];
if(!backups[i]) return;
if(confirm("Восстановить выбранную копию?")){
state=backups[i].data;
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
location.reload();
}
}

function renderBackups(){
let backups=safeParse(BACKUP_KEY)||[];
if(!backups.length) return "<div class='small'>Бэкапов пока нет</div>";
return backups.map((b,i)=>`
<div class="backup-item">
${new Date(b.time).toLocaleString()}
<button onclick="restoreBackup(${i})">Восстановить</button>
</div>
`).join("");
}

/* ================= NAV ================= */

let currentTab="auto";

function switchTab(tab){
currentTab=tab;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
render();
}

/* ================= AUTO ================= */

function renderAuto(){
content.innerHTML=`
<div class="header">Авто</div>
<div class="section">

<div class="stat">Модель: ${state.auto.carName||"Не указана"}</div>

<button onclick="toggleDebug()">DEBUG: ${state.meta.debug?"ON":"OFF"}</button>

<h3>Резервные копии</h3>
${renderBackups()}

</div>`;
}

function toggleDebug(){
state.meta.debug=!state.meta.debug;
save();
render();
}

/* ================= FUEL ================= */

function renderFuel(){
content.innerHTML=`
<div class="header">Топливо</div>
<div class="section">
<input type="date" id="fdate">
<input type="number" id="fkm" placeholder="Пробег">
<input type="number" id="fliters" placeholder="Литры">
<input type="number" id="fprice" placeholder="Сумма">
<button class="primary" onclick="addFuel()">Добавить</button>
<div id="fuelList"></div>
</div>`;

fuelList.innerHTML=state.fuel.map(f=>`
<div class="card">
${f.date} — ${f.km} км — ${f.liters} л — ${f.price} ₽
<button onclick="removeItem('fuel','${f.id}')">Удалить</button>
</div>`).join("");
}

function addFuel(){
if(!fdate.value||!fkm.value||!fliters.value||!fprice.value)return;
state.fuel.push({id:crypto.randomUUID(),date:fdate.value,km:+fkm.value,liters:+fliters.value,price:+fprice.value});
save();
renderFuel();
}

/* ================= SERVICE ================= */

function renderService(){
content.innerHTML=`
<div class="header">Сервис</div>
<div class="section">
<input id="sdesc" placeholder="Описание">
<input type="number" id="sprice" placeholder="Сумма">
<button class="primary" onclick="addService()">Добавить</button>
<div id="serviceList"></div>
</div>`;

serviceList.innerHTML=state.service.map(s=>`
<div class="card">
${s.desc} — ${s.price} ₽
<button onclick="removeItem('service','${s.id}')">Удалить</button>
</div>`).join("");
}

function addService(){
if(!sdesc.value||!sprice.value)return;
state.service.push({id:crypto.randomUUID(),desc:sdesc.value,price:+sprice.value});
save();
renderService();
}

/* ================= OTHER ================= */

function renderOther(){
content.innerHTML=`
<div class="header">Прочее</div>
<div class="section">
<input id="odesc" placeholder="Описание">
<input type="number" id="oprice" placeholder="Сумма">
<button class="primary" onclick="addOther()">Добавить</button>
<div id="otherList"></div>
</div>`;

otherList.innerHTML=state.other.map(o=>`
<div class="card">
${o.desc} — ${o.price} ₽
<button onclick="removeItem('other','${o.id}')">Удалить</button>
</div>`).join("");
}

function addOther(){
if(!odesc.value||!oprice.value)return;
state.other.push({id:crypto.randomUUID(),desc:odesc.value,price:+oprice.value});
save();
renderOther();
}

/* ================= SUMMARY ================= */

function renderSummary(){

let totalFuel=state.fuel.reduce((a,b)=>a+b.price,0);
let totalService=state.service.reduce((a,b)=>a+b.price,0);
let totalOther=state.other.reduce((a,b)=>a+b.price,0);
let total=totalFuel+totalService+totalOther;

content.innerHTML=`
<div class="header">Итоги</div>
<div class="section">

<div class="stat">Топливо: ${totalFuel} ₽</div>
<div class="stat">Сервис: ${totalService} ₽</div>
<div class="stat">Прочее: ${totalOther} ₽</div>
<div class="stat">Общие расходы: ${total} ₽</div>

${state.meta.debug?`
<div class="debug">
fuel: ${state.fuel.length}<br>
service: ${state.service.length}<br>
other: ${state.other.length}<br>
backups: ${(safeParse(BACKUP_KEY)||[]).length}
</div>`:""}

</div>`;
}

/* ================= COMMON ================= */

function removeItem(type,id){
state[type]=state[type].filter(i=>i.id!==id);
save();
render();
}

function render(){
if(currentTab==="auto")renderAuto();
if(currentTab==="fuel")renderFuel();
if(currentTab==="service")renderService();
if(currentTab==="other")renderOther();
if(currentTab==="summary")renderSummary();
}

switchTab("auto");
</script>
</body>
</html>
