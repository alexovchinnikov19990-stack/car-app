<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Belgee X50</title>

<link rel="icon" href="icon-192.png">

<style>

body{
font-family:Arial, sans-serif;
margin:20px;
background:#f7f7f7;
}

h1{
text-align:center;
}

section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #ddd;
padding:6px;
text-align:center;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<h1>Belgee X50</h1>

<section>

<h2>Топливо</h2>

<input type="date" id="fuelDate">
<input type="number" id="fuelMileage" placeholder="Пробег">
<input type="number" id="fuelLiters" placeholder="Литры">
<input type="number" id="fuelCost" placeholder="Сумма">

<button id="addFuel">Добавить</button>

<table id="fuelTable">

<thead>
<tr>
<th>Дата</th>
<th>Пробег</th>
<th>Литры</th>
<th>Сумма</th>
<th></th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section>

<h2>Сервис</h2>

<input type="text" id="serviceName" placeholder="Работа">
<input type="number" id="serviceCost" placeholder="Стоимость">

<button id="addService">Добавить</button>

<table id="serviceTable">

<thead>
<tr>
<th>Работа</th>
<th>Стоимость</th>
<th></th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section>

<h2>Прочее</h2>

<input type="text" id="otherName" placeholder="Описание">
<input type="number" id="otherCost" placeholder="Стоимость">

<button id="addOther">Добавить</button>

<table id="otherTable">

<thead>
<tr>
<th>Описание</th>
<th>Стоимость</th>
<th></th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<section>

<h2>Backup</h2>

<button id="downloadBackup">Скачать backup</button>
<input type="file" id="restoreBackup">

</section>

<section>

<h2>Аналитика</h2>

<canvas id="fuelChart"></canvas>
<canvas id="costChart"></canvas>

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="./app.js"></script>

</body>
</html>
