<!DOCTYPE html>  
<html lang="ru">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1">  
<title>Мой автомобиль</title>  
  
<!-- PWA / iOS -->  
<link rel="manifest" href="manifest.json">  
<meta name="apple-mobile-web-app-capable" content="yes">  
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">  
<meta name="theme-color" content="#0f1115">  
  
<style>  
body {  
  margin: 0;  
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;  
  background: #f4f5f7;  
}  
header {  
  display: flex;  
  gap: 6px;  
  padding: 10px;  
  background: #111;  
  overflow-x: auto;  
}  
header button {  
  background: #222;  
  color: #fff;  
  border: none;  
  padding: 8px 12px;  
  border-radius: 8px;  
}  
header button.active { background: #4caf50; }  
section { display: none; padding: 14px; }  
section.active { display: block; }  
.card {  
  background: #fff;  
  padding: 12px;  
  border-radius: 12px;  
  margin-bottom: 12px;  
}  
input, button, select {  
  width: 100%;  
  padding: 10px;  
  margin: 6px 0;  
  border-radius: 8px;  
  border: 1px solid #ccc;  
}  
.small { color: #666; font-size: 14px; }  
.warn { background: #fff3cd; }  
</style>  
</head>  
  
<body>  
  
<header>  
  <button onclick="show('car')" class="active">🚗 Авто</button>  
  <button onclick="show('fixed')">💰 Расходы</button>  
  <button onclick="show('fuel')">⛽ Топливо</button>  
  <button onclick="show('service')">🛠 ТО</button>  
  <button onclick="show('stats')">📊 Итоги</button>  
  <button onclick="show('backup')">📦 Данные</button>  
</header>  
  
<section id="car" class="active">  
  <div class="card">  
    <h3>Автомобиль</h3>  
    <input id="brand" placeholder="Марка">  
    <input id="model" placeholder="Модель">  
    <input id="buyDate" type="date">  
    <input id="price" type="number" placeholder="Цена покупки">  
    <input id="startKm" type="number" placeholder="Начальный пробег">  
    <input id="nextServiceKm" type="number" placeholder="Следующее ТО (км)">  
    <input id="nextServiceDate" type="date">  
    <button onclick="saveCar()">Сохранить</button>  
  </div>  
</section>  
  
<section id="fixed">  
  <div class="card">  
    <h3>Постоянные расходы (в месяц)</h3>  
    <input id="fcName" placeholder="Название">  
    <input id="fcAmount" type="number" placeholder="Сумма">  
    <button onclick="addFixed()">Добавить</button>  
  </div>  
  <div id="fixedList"></div>  
</section>  
  
<section id="fuel">  
  <div class="card">  
    <h3>Заправка</h3>  
    <input id="fuelDate" type="date">  
    <input id="fuelKm" type="number" placeholder="Пробег">  
    <input id="fuelLiters" type="number" placeholder="Литры">  
    <input id="fuelCost" type="number" placeholder="Сумма">  
    <button onclick="addFuel()">Добавить</button>  
  </div>  
  <div id="fuelList"></div>  
</section>  
  
<section id="service">  
  <div class="card">  
    <h3>Обслуживание</h3>  
    <input id="srvDate" type="date">  
    <input id="srvKm" type="number" placeholder="Пробег">  
    <input id="srvType" placeholder="Работы">  
    <input id="srvCost" type="number" placeholder="Стоимость">  
    <button onclick="addService()">Добавить</button>  
  </div>  
  <div id="serviceList"></div>  
</section>  
  
<section id="stats">  
  <div class="card">  
    <div id="statsContent"></div>  
  </div>  
</section>  
  
<section id="backup">  
  <div class="card">  
    <button onclick="exportJSON()">💾 Экспорт (резервная копия)</button>  
    <input type="file" onchange="importJSON(event)">  
    <p class="small">Рекомендуется сохранять файл в iCloud Drive</p>  
  </div>  
</section>  
  
<script>  
const KEY='carTrackerPWA';  
let data=JSON.parse(localStorage.getItem(KEY))||{  
  car:{},fixed:[],fuel:[],service:[]  
};  
  
function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}  
function show(id){  
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));  
  document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));  
  document.getElementById(id).classList.add('active');  
  event.target.classList.add('active');  
}  
  
function saveCar(){  
  data.car={  
    brand:brand.value,model:model.value,  
    buyDate:buyDate.value,price:+price.value,  
    startKm:+startKm.value,  
    nextServiceKm:+nextServiceKm.value,  
    nextServiceDate:nextServiceDate.value  
  }; save();  
}  
  
function addFixed(){data.fixed.push({name:fcName.value,amount:+fcAmount.value});fcName.value=fcAmount.value='';save();}  
function addFuel(){data.fuel.push({date:fuelDate.value,km:+fuelKm.value,liters:+fuelLiters.value,cost:+fuelCost.value});fuelDate.value=fuelKm.value=fuelLiters.value=fuelCost.value='';save();}  
function addService(){data.service.push({date:srvDate.value,km:+srvKm.value,type:srvType.value,cost:+srvCost.value});srvDate.value=srvKm.value=srvType.value=srvCost.value='';save();}  
function del(t,i){data[t].splice(i,1);save();}  
  
function exportJSON(){  
  download(JSON.stringify(data,null,2),"car-backup.json");  
}  
function importJSON(e){  
  const r=new FileReader();  
  r.onload=()=>{data=JSON.parse(r.result);save();}  
  r.readAsText(e.target.files[0]);  
}  
function download(text,name){  
  const a=document.createElement('a');  
  a.href=URL.createObjectURL(new Blob([text]));  
  a.download=name;a.click();  
}  
  
function render(){  
  fixedList.innerHTML=data.fixed.map((f,i)=>`<div class="card">${f.name}: ${f.amount} ₽ <button onclick="del('fixed',${i})">✕</button></div>`).join('');  
  fuelList.innerHTML=data.fuel.map((f,i)=>`<div class="card">${f.date} — ${f.km} км<br>${f.liters} л / ${f.cost} ₽ <button onclick="del('fuel',${i})">✕</button></div>`).join('');  
  serviceList.innerHTML=data.service.map((s,i)=>`<div class="card">${s.date} — ${s.km} км<br>${s.type}: ${s.cost} ₽ <button onclick="del('service',${i})">✕</button></div>`).join('');  
  
  const totalFuel=data.fuel.reduce((a,b)=>a+b.cost,0);  
  const totalService=data.service.reduce((a,b)=>a+b.cost,0);  
  const km=data.fuel.length?data.fuel[data.fuel.length-1].km-data.car.startKm:0;  
  const costKm=km?((totalFuel+totalService)/km).toFixed(2):0;  
  
  statsContent.innerHTML=`  
    <p>Пробег: ${km} км</p>  
    <p>Топливо: ${totalFuel} ₽</p>  
    <p>Обслуживание: ${totalService} ₽</p>  
    <strong>Стоимость 1 км: ${costKm} ₽</strong>  
  `;  
}  
render();  
</script>  
  
<script>  
if ('serviceWorker' in navigator) {  
  navigator.serviceWorker.register('service-worker.js');  
}  
</script>  
  
</body>  
</html>
