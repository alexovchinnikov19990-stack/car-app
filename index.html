<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, system-ui, sans-serif;
}
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  background: #222;
  border-radius: 12px;
  cursor: pointer;
}
.tab.active {
  background: #4caf50;
}
.section {
  display: none;
  padding: 15px;
}
.section.active {
  display: block;
}
input, button {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
button {
  background: #4caf50;
  color: #000;
  font-weight: bold;
}
.card {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.delete {
  background: #333;
  border-radius: 8px;
  padding: 6px 10px;
}
canvas {
  background: #fff;
  border-radius: 12px;
}
.summary {
  margin-top: 15px;
  background: #111;
  padding: 12px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" data-tab="auto">🚗 Авто</div>
  <div class="tab" data-tab="fuel">⛽ Топливо</div>
  <div class="tab" data-tab="service">🔧 Сервис</div>
  <div class="tab" data-tab="other">🧾 Прочее</div>
  <div class="tab" data-tab="summary">📊 Итоги</div>
</div>

<div id="auto" class="section active">
  <input id="carName" placeholder="Модель авто" />
  <input id="mileage" placeholder="Текущий пробег (км)" type="number" />
  <button id="saveAuto">Сохранить</button>
</div>

<div id="fuel" class="section"></div>
<div id="service" class="section"></div>
<div id="other" class="section"></div>

<div id="summary" class="section">
  <canvas id="chart"></canvas>
  <div class="summary" id="totals"></div>
  <button id="pdf">Выгрузить PDF</button>
</div>

<script>
const state = JSON.parse(localStorage.getItem('carApp')) || {
  auto: { name: '', mileage: 0 },
  fuel: [],
  service: [],
  other: []
};

const save = () => localStorage.setItem('carApp', JSON.stringify(state));

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
    render();
  };
});

document.getElementById('saveAuto').onclick = () => {
  state.auto.name = carName.value;
  state.auto.mileage = +mileage.value;
  save();
};

function renderList(type, elId) {
  const el = document.getElementById(elId);
  el.innerHTML = `
    <input placeholder="Пробег" type="number" id="${type}-km">
    <input placeholder="Описание" id="${type}-desc">
    <input placeholder="Стоимость" type="number" id="${type}-cost">
    <button id="${type}-add">Добавить</button>
  `;
  state[type].forEach((i, idx) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div>${i.km} км • ${i.desc} • ${i.cost} ₽</div>
      <div class="delete">🗑</div>`;
    d.querySelector('.delete').onclick = () => {
      state[type].splice(idx, 1);
      save(); render();
    };
    el.appendChild(d);
  });

  el.querySelector(`#${type}-add`).onclick = () => {
    state[type].push({
      km: +el.querySelector(`#${type}-km`).value,
      desc: el.querySelector(`#${type}-desc`).value,
      cost: +el.querySelector(`#${type}-cost`).value
    });
    save(); render();
  };
}

let chart;
function renderChart() {
  const sums = [
    state.fuel.reduce((a,b)=>a+b.cost,0),
    state.service.reduce((a,b)=>a+b.cost,0),
    state.other.reduce((a,b)=>a+b.cost,0)
  ];
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: {
      labels: ['Топливо','Сервис','Прочее'],
      datasets: [{ data: sums, backgroundColor: ['#2196f3','#f06292','#ff9800'] }]
    }
  });

  const total = sums.reduce((a,b)=>a+b,0);
  const km = state.auto.mileage || 1;
  document.getElementById('totals').innerHTML = `
    Общие расходы: ${total} ₽<br>
    Пробег: ${km} км<br>
    <b>Стоимость 1 км: ${(total/km).toFixed(2)} ₽</b>
  `;
}

function render() {
  carName.value = state.auto.name;
  mileage.value = state.auto.mileage;
  renderList('fuel','fuel');
  renderList('service','service');
  renderList('other','other');
  renderChart();
}

document.getElementById('pdf').onclick = async () => {
  const canvas = await html2canvas(document.getElementById('summary'));
  const img = canvas.toDataURL('image/png');
  const pdf = new jspdf.jsPDF();
  pdf.text(state.auto.name || 'Отчет', 10, 10);
  pdf.addImage(img, 'PNG', 10, 20, 180, 160);
  pdf.save('car-report.pdf');
};

render();
</script>
</body>
</html>
