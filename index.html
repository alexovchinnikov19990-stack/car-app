<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Control Stable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#111;
color:#fff;
}

nav{
display:flex;
background:#000;
position:sticky;
top:0;
z-index:10;
}

nav button{
flex:1;
padding:14px;
background:#000;
color:#fff;
border:none;
font-weight:600;
font-size:14px;
}

nav button.active{
background:#1f1f1f;
}

section{
padding:15px;
padding-bottom:60px;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
font-size:16px;
}

input{
background:#222;
color:#fff;
}

button.primary{
background:#0a84ff;
color:#fff;
}

.card{
background:#1a1a1a;
padding:10px;
margin:8px 0;
border-radius:8px;
}

.stat{
background:#151515;
padding:8px;
margin:5px 0;
border-radius:6px;
}

canvas{
background:#fff;
border-radius:8px;
margin-top:20px;
max-height:300px;
}
</style>
</head>
<body>

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('fuel')" id="tab-fuel">Топливо</button>
<button onclick="switchTab('service')" id="tab-service">Сервис</button>
<button onclick="switchTab('other')" id="tab-other">Прочее</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<section id="content"></section>

<script>
const STORAGE_KEY="auto_core_v4";

let state = load();
let currentTab="auto";

let pieChart=null;
let lineChart=null;
let fuelConsumptionChart=null;

function load(){
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return{auto:{model:"",mileage:null},fuel:[],service:[],other:[]};
return JSON.parse(raw);
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function id(){return crypto.randomUUID();}
function num(v){const n=Number(v);return isNaN(n)?0:n;}

function formatDateSafe(dateStr){
if(!dateStr) return "";
const p=dateStr.split("-");
return p[2]+"."+p[1]+"."+p[0];
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
render();
}

function render(){
content.innerHTML="";
if(currentTab==="auto") renderAuto();
if(currentTab==="fuel") renderFuel();
if(currentTab==="service") renderService();
if(currentTab==="other") renderOther();
if(currentTab==="summary") renderSummary();
}

/* AUTO */
function renderAuto(){
content.innerHTML=`
<h2>Авто</h2>
<input id="model" placeholder="Модель" value="${state.auto.model}">
<input id="mileage" type="number" placeholder="Текущий пробег" value="${state.auto.mileage??""}">
<button class="primary" onclick="saveAuto()">Сохранить</button>
`;
}

function saveAuto(){
state.auto.model=model.value;
state.auto.mileage=mileage.value?Number(mileage.value):null;
save();
alert("Сохранено");
}

/* FUEL */
function renderFuel(){
content.innerHTML=`
<h2>Топливо</h2>
<input type="date" id="fdate">
<input type="number" id="fkm" placeholder="Пробег">
<input type="number" id="fliters" placeholder="Литры">
<input type="number" id="fprice" placeholder="Сумма">
<button class="primary" onclick="addFuel()">Добавить</button>
<div id="fuelList"></div>
`;
renderFuelList();
}

function addFuel(){
if(!fdate.value||!fkm.value||!fliters.value||!fprice.value){
alert("Заполни все поля");
return;
}

state.fuel.push({
id:id(),
date:fdate.value,
km:num(fkm.value),
liters:num(fliters.value),
price:num(fprice.value)
});

state.fuel.sort((a,b)=>a.km-b.km);
save();
renderFuel();
}

function renderFuelList(){
fuelList.innerHTML=state.fuel.map(f=>`
<div class="card">
<b>${formatDateSafe(f.date)}</b>
<div>${f.km} км</div>
<div>${f.liters} л — ${f.price} ₽</div>
<button onclick="removeItem('fuel','${f.id}')">Удалить</button>
</div>
`).join("");
}

/* SERVICE */
function renderService(){
content.innerHTML=`
<h2>Сервис</h2>
<input type="date" id="sdate">
<input type="number" id="skm" placeholder="Пробег">
<input id="sdesc" placeholder="Описание">
<input type="number" id="sprice" placeholder="Сумма">
<button class="primary" onclick="addService()">Добавить</button>
<div id="serviceList"></div>
`;
renderServiceList();
}

function addService(){
if(!sdate.value||!skm.value||!sdesc.value||!sprice.value){
alert("Заполни все поля");
return;
}

state.service.push({
id:id(),
date:sdate.value,
km:num(skm.value),
desc:sdesc.value,
price:num(sprice.value)
});

save();
renderService();
}

function renderServiceList(){
serviceList.innerHTML=state.service.map(s=>`
<div class="card">
<b>${formatDateSafe(s.date)}</b>
<div>${s.km} км</div>
<div>${s.desc} — ${s.price} ₽</div>
<button onclick="removeItem('service','${s.id}')">Удалить</button>
</div>
`).join("");
}

/* OTHER */
function renderOther(){
content.innerHTML=`
<h2>Прочее</h2>
<input type="date" id="odate">
<input id="odesc" placeholder="Описание">
<input type="number" id="oprice" placeholder="Сумма">
<button class="primary" onclick="addOther()">Добавить</button>
<div id="otherList"></div>
`;
renderOtherList();
}

function addOther(){
if(!odate.value||!odesc.value||!oprice.value){
alert("Заполни все поля");
return;
}

state.other.push({
id:id(),
date:odate.value,
desc:odesc.value,
price:num(oprice.value)
});

save();
renderOther();
}

function renderOtherList(){
otherList.innerHTML=state.other.map(o=>`
<div class="card">
<b>${formatDateSafe(o.date)}</b>
<div>${o.desc} — ${o.price} ₽</div>
<button onclick="removeItem('other','${o.id}')">Удалить</button>
</div>
`).join("");
}

function removeItem(type,id){
state[type]=state[type].filter(i=>i.id!==id);
save();
render();
}

/* SUMMARY */
function renderSummary(){

const fuelSum=state.fuel.reduce((a,b)=>a+b.price,0);
const serviceSum=state.service.reduce((a,b)=>a+b.price,0);
const otherSum=state.other.reduce((a,b)=>a+b.price,0);
const total=fuelSum+serviceSum+otherSum;

let avgConsumption="-";
const fuelSorted=state.fuel.slice().sort((a,b)=>a.km-b.km);

if(fuelSorted.length>=2){
let totalLiters=0;
let totalDistance=0;

for(let i=1;i<fuelSorted.length;i++){
const prev=fuelSorted[i-1];
const curr=fuelSorted[i];
const dist=curr.km-prev.km;

if(dist>0){
totalLiters+=curr.liters;
totalDistance+=dist;
}
}

if(totalDistance>0){
avgConsumption=((totalLiters/totalDistance)*100).toFixed(2);
}
}

content.innerHTML=`
<h2>Итоги</h2>
<div class="stat">Общие расходы: ${total} ₽</div>
<div class="stat">Топливо: ${fuelSum} ₽</div>
<div class="stat">Сервис: ${serviceSum} ₽</div>
<div class="stat">Прочее: ${otherSum} ₽</div>
<div class="stat">Средний расход: ${avgConsumption} л/100км</div>
<canvas id="pieChart"></canvas>
<canvas id="expenseChart"></canvas>
<canvas id="fuelChart"></canvas>
`;

if(pieChart) pieChart.destroy();
if(lineChart) lineChart.destroy();
if(fuelConsumptionChart) fuelConsumptionChart.destroy();

/* PIE */
pieChart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Топливо","Сервис","Прочее"],
datasets:[{data:[fuelSum,serviceSum,otherSum]}]
}
});

/* EXPENSE LINE */
const grouped={};
[...state.fuel,...state.service,...state.other].forEach(e=>{
if(!e.date)return;
grouped[e.date]=(grouped[e.date]||0)+e.price;
});

const keys=Object.keys(grouped).sort((a,b)=>new Date(a)-new Date(b));

lineChart=new Chart(document.getElementById("expenseChart"),{
type:"line",
data:{
labels:keys.map(k=>formatDateSafe(k)),
datasets:[{
label:"Расходы",
data:keys.map(k=>grouped[k]),
tension:0.3
}]
},
options:{responsive:true,maintainAspectRatio:false}
});

/* FUEL CONSUMPTION LINE */
if(fuelSorted.length>=2){
const labels=[];
const values=[];

for(let i=1;i<fuelSorted.length;i++){
const prev=fuelSorted[i-1];
const curr=fuelSorted[i];
const dist=curr.km-prev.km;

if(dist>0){
const cons=(curr.liters/dist)*100;
labels.push(formatDateSafe(curr.date));
values.push(Number(cons.toFixed(2)));
}
}

fuelConsumptionChart=new Chart(document.getElementById("fuelChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Расход л/100км",
data:values,
tension:0.3
}]
},
options:{responsive:true,maintainAspectRatio:false}
});
}
}

switchTab("auto");
</script>

</body>
</html>
