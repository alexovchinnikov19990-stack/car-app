<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Belgee X50 Tracker</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
margin:0;
padding:0;
background:#111;
color:#fff;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#222;
padding:10px;
}

nav button{
background:#333;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

section{
display:none;
padding:15px;
}

section.active{
display:block;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#444;
color:white;
}

canvas{
background:#fff;
margin-top:20px;
}

</style>

</head>

<body>

<header>
Belgee X50
</header>

<nav>

<button onclick="showTab('fuel')">
Топливо
</button>

<button onclick="showTab('service')">
Сервис
</button>

<button onclick="showTab('other')">
Прочее
</button>

<button onclick="showTab('stats')">
Итоги
</button>

<button onclick="showTab('car')">
Авто
</button>

</nav>


<section id="fuel" class="active">

<h2>Топливо</h2>

<input type="date" id="fuelDate">
<input type="number" id="fuelLiters" placeholder="Литры">
<input type="number" id="fuelPrice" placeholder="Стоимость">
<input type="number" id="fuelOdo" placeholder="Пробег">

<button onclick="addFuel()">
Добавить
</button>

<div id="fuelList"></div>

</section>



<section id="service">

<h2>Сервис</h2>

<p>Раздел сервиса</p>

</section>



<section id="other">

<h2>Прочее</h2>

<input id="otherText" placeholder="Комментарий">

<button onclick="addOther()">
Добавить
</button>

<div id="otherList"></div>

</section>



<section id="stats">

<h2>Итоги</h2>

<canvas id="costChart"></canvas>
<canvas id="fuelChart"></canvas>

</section>



<section id="car">

<h2>Авто</h2>

<p>Модель: Belgee X50</p>

<h3>Backup</h3>

<button onclick="exportBackup()">
Скачать backup
</button>

<br><br>

<input type="file" id="backupFile">

<button onclick="loadBackup()">
Восстановить backup
</button>

</section>



<script>

function showTab(id){

document.querySelectorAll("section")
.forEach(s => s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

</script>



<script type="module">

import { exportBackup, importBackup } from "./domain/backup.js";

window.exportBackup = exportBackup;

window.loadBackup = function(){

const file =
document.getElementById("backupFile").files[0];

if(!file){

alert("Выберите файл backup");

return;

}

importBackup(file);

};

</script>


</body>
</html>
