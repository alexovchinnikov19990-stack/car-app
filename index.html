<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belgee X50 — Auto Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Belgee X50</h1>
    <button onclick="createBackupNow()">Создать бэкап</button>
  </header>

  <main>

    <!-- ===== ТОПЛИВО ===== -->
    <section>
      <h2>Топливо</h2>

      <div class="form">
        <input type="date" id="fuelDate" />
        <input type="number" id="fuelKm" placeholder="Пробег (км)" />
        <input type="number" id="fuelLiters" placeholder="Литры" step="0.01" />
        <input type="number" id="fuelPrice" placeholder="Сумма" step="0.01" />
        <button onclick="addFuelFromForm()">Добавить</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Дата</th>
            <th>Пробег</th>
            <th>Литры</th>
            <th>Сумма</th>
            <th>Цена/л</th>
            <th>Расход</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="fuelTable"></tbody>
      </table>
    </section>

    <!-- ===== ИТОГИ ===== -->
    <section>
      <h2>Итоги</h2>
      <div id="totals"></div>
    </section>

    <!-- ===== ГРАФИКИ ===== -->
    <section class="charts">
      <h2>Аналитика</h2>

      <div class="chart-container">
        <canvas id="expensePie"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="fuelLine"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="expenseLine"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="mileageLine"></canvas>
      </div>
    </section>

  </main>

  <!-- Модульная загрузка -->
  <script type="module" src="app.js"></script>

</body>
</html>
