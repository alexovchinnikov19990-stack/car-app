<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Учёт расходов авто</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'Roboto', sans-serif;
}

.container {
  padding: 15px;
}

.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.tab {
  padding: 10px 14px;
  border-radius: 14px;
  background: #222;
  cursor: pointer;
  white-space: nowrap;
}

.tab.active {
  background: #4CAF50;
}

input, button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

button {
  background: #4CAF50;
  cursor: pointer;
}

.list-item {
  background: #222;
  border-radius: 14px;
  padding: 12px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.remove {
  background: none;
  color: red;
  font-size: 20px;
  cursor: pointer;
}

#pdf-content {
  background: #fff;
  color: #000;
  padding: 20px;
}

.stats {
  margin-top: 20px;
  background: #111;
  color: #fff;
  padding: 14px;
  border-radius: 14px;
}
</style>
</head>

<body>
<div class="container">

<div class="tabs">
  <div class="tab active" data-tab="auto">🚗 Авто</div>
  <div class="tab" data-tab="fuel">⛽ Топливо</div>
  <div class="tab" data-tab="service">🔧 Сервис</div>
  <div class="tab" data-tab="other">🧾 Прочее</div>
  <div class="tab" data-tab="reglament">🧩 Регламент</div>
  <div class="tab" data-tab="summary">📊 Итоги</div>
</div>

<div id="content"></div>

</div>

<script>
let state = JSON.parse(localStorage.getItem('autoApp')) || {
  model: '',
  mileage: null,
  fuel: [],
  service: [],
  other: [],
  reglament: []
};

const content = document.getElementById('content');

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render(tab.dataset.tab);
  };
});

function save() {
  localStorage.setItem('autoApp', JSON.stringify(state));
}

function render(tab) {
  if (tab === 'auto') renderAuto();
  if (tab === 'fuel') renderFuel();
  if (tab === 'service') renderGeneric('service');
  if (tab === 'other') renderGeneric('other');
  if (tab === 'reglament') renderGeneric('reglament');
  if (tab === 'summary') renderSummary();
}

function renderAuto() {
  content.innerHTML = `
    <input placeholder="Модель авто" value="${state.model}">
    <input placeholder="Пробег, км" type="number" value="${state.mileage ?? ''}">
    <button>Сохранить</button>
  `;
  const [model, mileage, btn] = content.children;
  btn.onclick = () => {
    state.model = model.value.trim();
    state.mileage = mileage.value ? Number(mileage.value) : null;
    save();
  };
}

function renderFuel() {
  content.innerHTML = `
    <input placeholder="Литры" type="number">
    <input placeholder="Стоимость" type="number">
    <button>Добавить</button>
    <div id="list"></div>
  `;
  const [liters, price, btn, list] = content.children;
  btn.onclick = () => {
    if (!liters.value || !price.value) return;
    state.fuel.push({ liters: +liters.value, price: +price.value });
    save();
    renderFuel();
  };
  state.fuel.forEach((i, idx) => {
    list.innerHTML += `
      <div class="list-item">
        ${i.liters} л · ${i.price} ₽
        <span class="remove" onclick="remove('fuel', ${idx})">✕</span>
      </div>
    `;
  });
}

function renderGeneric(type) {
  content.innerHTML = `
    <input placeholder="Описание">
    <input placeholder="Стоимость" type="number">
    <button>Добавить</button>
    <div id="list"></div>
  `;
  const [desc, price, btn, list] = content.children;
  btn.onclick = () => {
    if (!desc.value || !price.value) return;
    state[type].push({ desc: desc.value, price: +price.value });
    save();
    renderGeneric(type);
  };
  state[type].forEach((i, idx) => {
    list.innerHTML += `
      <div class="list-item">
        ${i.desc} · ${i.price} ₽
        <span class="remove" onclick="remove('${type}', ${idx})">✕</span>
      </div>
    `;
  });
}

function remove(type, index) {
  state[type].splice(index, 1);
  save();
  render(document.querySelector('.tab.active').dataset.tab);
}

function renderSummary() {
  const fuelSum = state.fuel.reduce((a,b)=>a+b.price,0);
  const serviceSum = state.service.reduce((a,b)=>a+b.price,0);
  const otherSum = state.other.reduce((a,b)=>a+b.price,0);
  const total = fuelSum + serviceSum + otherSum;
  const kmCost = state.mileage ? (total / state.mileage).toFixed(2) : '—';

  content.innerHTML = `
    <div id="pdf-content">
      <h2>${state.model || 'Авто'}</h2>
      <canvas id="chart"></canvas>
      <div class="stats">
        Общие расходы: ${total} ₽<br>
        Пробег: ${state.mileage ?? '—'} км<br>
        <b>Стоимость 1 км: ${kmCost} ₽</b>
      </div>
    </div>
    <button onclick="exportPDF()">Выгрузить PDF</button>
  `;

  new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: {
      labels: ['Топливо','Сервис','Прочее'],
      datasets: [{
        data: [fuelSum, serviceSum, otherSum],
        backgroundColor: ['#2196F3','#E91E63','#FF9800']
      }]
    }
  });
}

async function exportPDF() {
  const el = document.getElementById('pdf-content');
  const canvas = await html2canvas(el, { scale: 2 });
  const img = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const w = 210;
  const h = canvas.height * w / canvas.width;
  pdf.addImage(img,'PNG',0,0,w,h);
  pdf.save('auto.pdf');
}

render('auto');
</script>
</body>
</html>
