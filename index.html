<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoLog</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:20px;
}

section{
margin-bottom:40px;
background:#1b1b1b;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#2ecc71;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
text-align:center;
}

canvas{
margin-top:20px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🚗 AutoLog — учёт расходов автомобиля</h1>

<section>

<h2>Добавить заправку</h2>

<input type="date" id="fuel_date">

<input type="number" id="fuel_odometer" placeholder="Пробег">

<input type="number" id="fuel_liters" placeholder="Литры">

<input type="number" id="fuel_price" placeholder="Цена">

<button onclick="addFuel()">Добавить</button>

</section>

<section>

<h2>История заправок</h2>

<table>

<thead>

<tr>
<th>Дата</th>
<th>Пробег</th>
<th>Литры</th>
<th>Цена</th>
<th></th>
</tr>

</thead>

<tbody id="fuel_table"></tbody>

</table>

</section>

<section>

<h2>Расход топлива</h2>

<canvas id="fuelChart"></canvas>

</section>

<script src="state/state.js"></script>
<script src="storage/storage.js"></script>
<script src="domain/fuel.js"></script>
<script src="app.js"></script>

</body>
</html>
