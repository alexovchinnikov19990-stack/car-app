<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Belgee X50</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
background:#1a1a1a;
}

nav button{
background:#333;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button.main{
background:#444;
color:white;
padding:12px 18px;
border:none;
border-radius:10px;
margin-top:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:8px;
text-align:center;
}

canvas{
margin-top:40px;
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<header>Belgee X50</header>

<nav>

<button onclick="openTab('fuel')">Топливо</button>
<button onclick="openTab('service')">Сервис</button>
<button onclick="openTab('other')">Прочее</button>
<button onclick="openTab('stats')">Итоги</button>
<button onclick="openTab('car')">Авто</button>

</nav>

<!-- ТОПЛИВО -->

<section id="fuel" class="active">

<h2>Топливо</h2>

<input type="date" id="fuelDate">
<input type="number" placeholder="Пробег" id="fuelKm">
<input type="number" placeholder="Литры" id="fuelLiters">
<input type="number" placeholder="Сумма" id="fuelPrice">

<button class="main" onclick="addFuel()">Добавить</button>

<table id="fuelTable">

<thead>
<tr>
<th>Дата</th>
<th>Пробег</th>
<th>Литры</th>
<th>Сумма</th>
<th>Цена/л</th>
<th>Расход</th>
<th></th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

<!-- СЕРВИС -->

<section id="service">

<h2>Сервис</h2>

<input id="serviceName" placeholder="Работа">
<input id="servicePrice" type="number" placeholder="Стоимость">

<button class="main" onclick="addService()">Добавить</button>

<ul id="serviceList"></ul>

</section>

<!-- ПРОЧЕЕ -->

<section id="other">

<h2>Прочее</h2>

<input id="otherName" placeholder="Описание">
<input id="otherPrice" type="number" placeholder="Стоимость">

<button class="main" onclick="addOther()">Добавить</button>

<ul id="otherList"></ul>

</section>

<!-- ИТОГИ -->

<section id="stats">

<h2>Итоги</h2>

<p>Топливо: <span id="fuelTotal">0</span></p>
<p>Сервис: <span id="serviceTotal">0</span></p>
<p>Прочее: <span id="otherTotal">0</span></p>

<p><b>Всего: <span id="allTotal">0</span></b></p>

<p>Средний расход: <span id="avg">-</span></p>
<p>Стоимость 1 км: <span id="kmCost">-</span></p>

<canvas id="chartFuel"></canvas>

</section>

<!-- АВТО -->

<section id="car">

<h2>Авто</h2>

<p>Модель: Belgee X50</p>

<h3>Backup</h3>

<button class="main" onclick="downloadBackup()">Скачать backup</button>

<br><br>

<input type="file" id="backupFile">

<br>

<button class="main" onclick="restoreBackup()">Восстановить backup</button>

</section>

<script src="state.js"></script>
<script src="storage.js"></script>
<script src="domain/fuel.js"></script>
<script src="domain/analytics.js"></script>
<script src="domain/service.js"></script>
<script src="domain/other.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>

</body>
</html>
