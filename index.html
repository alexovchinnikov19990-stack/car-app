<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auto Control PRO v16 AUTO BACKUP</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#111;color:#fff}
nav{display:flex;background:#000;position:sticky;top:0;z-index:10}
nav button{flex:1;padding:14px 6px;background:#000;color:#fff;border:none;font-weight:600;font-size:13px}
nav button.active{background:#1f1f1f;border-radius:10px}
.section{padding:15px;padding-bottom:80px}
.card,.stat{background:#1a1a1a;padding:12px;margin:10px 0;border-radius:12px}
button{padding:10px;border:none;border-radius:8px;background:#0a84ff;color:#fff;margin-top:5px}
.backup-item{background:#222;padding:10px;margin-top:8px;border-radius:8px;font-size:13px}
.danger{background:#aa2222}
.small{font-size:12px;opacity:.7}
</style>
</head>
<body>

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<div id="content"></div>

<script>
const STORAGE_KEY="auto_v16";
const BACKUP_KEY="auto_v16_backups";
const MAX_BACKUPS=10;

let state;
try{
state=JSON.parse(localStorage.getItem(STORAGE_KEY));
}catch{state=null;}

if(!state){
state={meta:{version:16},fuel:[],service:[],other:[],auto:{}};
save(false);
}

function save(makeBackup=true){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
if(makeBackup) createBackup();
}

function createBackup(){
let backups;
try{
backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];
}catch{backups=[];}

backups.unshift({
timestamp:Date.now(),
data:JSON.parse(JSON.stringify(state))
});

if(backups.length>MAX_BACKUPS){
backups=backups.slice(0,MAX_BACKUPS);
}

localStorage.setItem(BACKUP_KEY,JSON.stringify(backups));
}

function renderBackups(){
let backups;
try{
backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];
}catch{backups=[];}

if(!backups.length){
return "<div class='small'>Бэкапов пока нет</div>";
}

return backups.map((b,i)=>`
<div class="backup-item">
${new Date(b.timestamp).toLocaleString()}
<br>
<button onclick="restoreBackup(${i})">Восстановить</button>
<button class="danger" onclick="deleteBackup(${i})">Удалить</button>
</div>
`).join("");
}

function restoreBackup(index){
let backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];
if(!backups[index]) return;

if(confirm("Восстановить эту резервную копию?")){
state=backups[index].data;
save(false);
location.reload();
}
}

function deleteBackup(index){
let backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];
backups.splice(index,1);
localStorage.setItem(BACKUP_KEY,JSON.stringify(backups));
render();
}

function switchTab(tab){
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");

if(tab==="auto"){
content.innerHTML=`
<div class="section">
<h2>Резервные копии</h2>
${renderBackups()}
</div>`;
}

if(tab==="summary"){
content.innerHTML=`
<div class="section">
<h2>Статус</h2>
<div class="stat">Топливо: ${state.fuel.length}</div>
<div class="stat">Сервис: ${state.service.length}</div>
<div class="stat">Прочее: ${state.other.length}</div>
</div>`;
}
}

switchTab("auto");
</script>
</body>
</html>
