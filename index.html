<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auto Control PRO v13 FULL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#111;color:#fff}
nav{display:flex;background:#000;position:sticky;top:0;z-index:10}
nav button{flex:1;padding:14px 6px;background:#000;color:#fff;border:none;font-weight:600;font-size:13px}
nav button.active{background:#1f1f1f;border-radius:10px}
.header-bg{height:200px;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:20px;position:relative}
.header-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9))}
.header-bg h2{position:relative;margin:0;font-size:26px}
.section{padding:15px;padding-bottom:80px}
input,button,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;font-size:16px}
input,select{background:#222;color:#fff}
button.primary{background:#0a84ff;color:#fff}
.card,.stat{background:#1a1a1a;padding:12px;margin:10px 0;border-radius:12px}
canvas{background:#fff;border-radius:12px;margin-top:20px;max-height:320px}
.info{background:#222;padding:15px;border-radius:12px;text-align:center;margin-top:20px}
</style>
</head>
<body>

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('fuel')" id="tab-fuel">Топливо</button>
<button onclick="switchTab('service')" id="tab-service">Сервис</button>
<button onclick="switchTab('other')" id="tab-other">Прочее</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<div id="content"></div>

<script>
const STORAGE_KEY="auto_v13_full";

let state=JSON.parse(localStorage.getItem(STORAGE_KEY))||{
auto:{},fuel:[],service:[],other:[]
};

let currentTab="auto";
let pieChart,lineChart;

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function id(){return crypto.randomUUID()}
function num(v){return Number(v)||0}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
render();
}

function header(title,img){
return `<div class="header-bg" style="background-image:url('./images/${img}')"><h2>${title}</h2></div><div class="section">`;
}

/* AUTO */
function renderAuto(){
content.innerHTML=header("Авто","bg-car.jpg")+`
<input id="model" placeholder="Модель" value="${state.auto.model||""}">
<input id="mileage" type="number" placeholder="Пробег" value="${state.auto.mileage||""}">
<button class="primary" onclick="saveAuto()">Сохранить</button></div>`;
}
function saveAuto(){
state.auto.model=model.value.trim();
state.auto.mileage=num(mileage.value);
save();
}

/* FUEL */
function renderFuel(){
content.innerHTML=header("Топливо","bg-fuel.jpg")+`
<input type="date" id="fdate">
<input type="number" id="fkm" placeholder="Пробег">
<input type="number" id="fliters" placeholder="Литры">
<input type="number" id="fprice" placeholder="Сумма">
<button class="primary" onclick="addFuel()">Добавить</button>
<div id="fuelList"></div></div>`;

fuelList.innerHTML=[...state.fuel]
.sort((a,b)=>new Date(b.date)-new Date(a.date))
.map(f=>`
<div class="card">
<b>${f.date}</b><br>
${f.km} км — ${f.liters} л — ${f.price} ₽
<button onclick="removeItem('fuel','${f.id}')">Удалить</button>
</div>`).join("");
}

function addFuel(){
if(!fdate.value||!fkm.value||!fliters.value||!fprice.value)return;

if(state.fuel.length){
let last=[...state.fuel].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
if(num(fkm.value)<last.km){alert("Пробег меньше предыдущего!");return;}
}

state.fuel.push({id:id(),date:fdate.value,km:num(fkm.value),liters:num(fliters.value),price:num(fprice.value)});
save();renderFuel();
}

/* SERVICE */
function renderService(){
content.innerHTML=header("Сервис","bg-service.jpg")+`
<input id="sdate" type="date">
<input id="sdesc" placeholder="Описание">
<input type="number" id="sprice" placeholder="Сумма">
<button class="primary" onclick="addService()">Добавить</button>
<div id="serviceList"></div></div>`;

serviceList.innerHTML=state.service.map(s=>`
<div class="card">
<b>${s.date||""}</b><br>
${s.desc} — ${s.price} ₽
<button onclick="removeItem('service','${s.id}')">Удалить</button>
</div>`).join("");
}

function addService(){
if(!sdesc.value||!sprice.value)return;
state.service.push({id:id(),date:sdate.value,desc:sdesc.value.trim(),price:num(sprice.value)});
save();renderService();
}

/* OTHER */
function renderOther(){
content.innerHTML=header("Прочее","bg-rules.jpg")+`
<input id="odate" type="date">
<input id="odesc" placeholder="Описание">
<input type="number" id="oprice" placeholder="Сумма">
<button class="primary" onclick="addOther()">Добавить</button>
<div id="otherList"></div></div>`;

otherList.innerHTML=state.other.map(o=>`
<div class="card">
<b>${o.date||""}</b><br>
${o.desc} — ${o.price} ₽
<button onclick="removeItem('other','${o.id}')">Удалить</button>
</div>`).join("");
}

function addOther(){
if(!odesc.value||!oprice.value)return;
state.other.push({id:id(),date:odate.value,desc:odesc.value.trim(),price:num(oprice.value)});
save();renderOther();
}

/* SUMMARY */
function renderSummary(){

let months=[...new Set(state.fuel.map(f=>f.date?.slice(0,7)).filter(Boolean))];

content.innerHTML=header("Итоги","bg-stats.jpg")+`
<div class="stat">
<select id="monthSelect">
<option value="all">Всё время</option>
${months.map(m=>`<option value="${m}">${m}</option>`).join("")}
</select>
</div>
<div id="summaryContent"></div></div>`;

document.getElementById("monthSelect").onchange=updateSummary;
updateSummary();
}

function updateSummary(){

let selected=document.getElementById("monthSelect").value;

let allFuel=[...state.fuel].sort((a,b)=>new Date(a.date)-new Date(b.date));

let fuelData=selected==="all"?allFuel:
allFuel.filter(f=>f.date.startsWith(selected));

let serviceData=selected==="all"?state.service:
state.service.filter(s=>s.date&&s.date.startsWith(selected));

let otherData=selected==="all"?state.other:
state.other.filter(o=>o.date&&o.date.startsWith(selected));

let fuelSum=fuelData.reduce((a,b)=>a+b.price,0);
let serviceSum=serviceData.reduce((a,b)=>a+b.price,0);
let otherSum=otherData.reduce((a,b)=>a+b.price,0);
let total=fuelSum+serviceSum+otherSum;

/* глобальный расчёт расхода */
let consumption=[];
let labels=[];

for(let i=1;i<allFuel.length;i++){
let prev=allFuel[i-1],curr=allFuel[i];
let d=curr.km-prev.km;
if(d>0){
let c=(curr.liters/d*100);
if(!isNaN(c)&&isFinite(c)){
consumption.push({date:curr.date,value:Number(c.toFixed(2))});
}
}
}

/* фильтрация точек по месяцу */
let filteredPoints=selected==="all"?consumption:
consumption.filter(c=>c.date.startsWith(selected));

let avg=null;
if(filteredPoints.length){
avg=(filteredPoints.reduce((a,b)=>a+b.value,0)/filteredPoints.length).toFixed(2);
}

let totalKm=0;
if(fuelData.length>1){
totalKm=fuelData[fuelData.length-1].km-fuelData[0].km;
}

let costPerKm=totalKm>0?(total/totalKm).toFixed(2):null;

summaryContent.innerHTML=`
<div class="stat">Общие расходы: ${total} ₽</div>
<div class="stat">Средний расход: ${avg?avg+" л/100км":"Недостаточно данных"}</div>
<div class="stat">Стоимость 1 км: ${costPerKm?costPerKm+" ₽":"Недостаточно данных"}</div>
<canvas id="pieChart"></canvas>
${filteredPoints.length?`<canvas id="lineChart"></canvas>`:
`<div class="info">Недостаточно данных для графика</div>`}
`;

if(pieChart)pieChart.destroy();
if(lineChart)lineChart.destroy();

pieChart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{labels:["Топливо","Сервис","Прочее"],
datasets:[{data:[fuelSum,serviceSum,otherSum]}]}
});

if(filteredPoints.length){
lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:filteredPoints.map(p=>p.date),
datasets:[{label:"Расход (л/100км)",data:filteredPoints.map(p=>p.value),tension:.3}]
}
});
}
}

function removeItem(type,id){
state[type]=state[type].filter(i=>i.id!==id);
save();render();
}

function render(){
if(currentTab==="auto")renderAuto();
if(currentTab==="fuel")renderFuel();
if(currentTab==="service")renderService();
if(currentTab==="other")renderOther();
if(currentTab==="summary")renderSummary();
}

switchTab("auto");
</script>
</body>
</html>
