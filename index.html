<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мой автомобиль</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system,system-ui;background:#000;color:#fff}
header{display:flex;gap:6px;padding:10px;background:rgba(0,0,0,.85);position:sticky;top:0;z-index:10}
header button{background:#222;color:#fff;border:0;padding:8px 12px;border-radius:10px;white-space:nowrap}
header button.active{background:#4caf50;color:#000}
.section{display:none;min-height:100vh;padding:16px;background-size:cover;background-position:center}
.card{background:rgba(0,0,0,.75);padding:14px;border-radius:14px;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:0}
button.add{background:#fff;color:#000;font-weight:600}
.del{background:none;color:#ff5252;font-size:20px}
</style>
</head>

<body>

<header>
<button data-tab="car">🚗 Авто</button>
<button data-tab="fuel">⛽ Топливо</button>
<button data-tab="service">🛠 Сервис</button>
<button data-tab="other">🧾 Прочее</button>
<button data-tab="rules">🧩 Регламент</button>
<button data-tab="stats">📊 Итоги</button>
</header>

<div id="car" class="section">
<div class="card">
<input id="brand" placeholder="Марка">
<input id="model" placeholder="Модель">
<input id="startKm" type="number" placeholder="Начальный пробег">
<button class="add" onclick="saveCar()">Сохранить</button>
</div>
</div>

<div id="fuel" class="section">
<div class="card">
<input id="fuelKm" type="number" placeholder="Пробег">
<input id="fuelLiters" type="number" placeholder="Литры">
<input id="fuelCost" type="number" placeholder="Стоимость">
<button class="add" onclick="addFuel()">Добавить</button>
</div>
<div id="fuelList"></div>
</div>

<div id="service" class="section">
<div class="card">
<input id="srvKm" type="number" placeholder="Пробег">
<input id="srvDesc" placeholder="Описание работ">
<input id="srvCost" type="number" placeholder="Стоимость">
<button class="add" onclick="addService()">Добавить</button>
</div>
<div id="serviceList"></div>
</div>

<div id="other" class="section">
<div class="card">
<input id="otherDesc" placeholder="Описание">
<input id="otherCost" type="number" placeholder="Стоимость">
<button class="add" onclick="addOther()">Добавить</button>
</div>
<div id="otherList"></div>
</div>

<div id="rules" class="section">
<div class="card">
<input id="ruleName" placeholder="Узел">
<input id="ruleKm" type="number" placeholder="Интервал, км">
<button class="add" onclick="addRule()">Добавить</button>
</div>
<div id="rulesList"></div>
</div>

<div id="stats" class="section">
<div class="card">
<canvas id="chart"></canvas>
<div id="statsText"></div>
<button class="add" onclick="exportPDF()">📄 PDF отчёт</button>
</div>
</div>

<script>
const KEY='carAppFinal';
let data=JSON.parse(localStorage.getItem(KEY))||{
  car:{},fuel:[],service:[],other:[],rules:[]
};

const tabs=document.querySelectorAll('[data-tab]');
const sections=document.querySelectorAll('.section');

function show(tab){
sections.forEach(s=>s.style.display=s.id===tab?'block':'none');
tabs.forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
localStorage.setItem('tab',tab);
}
tabs.forEach(b=>b.onclick=()=>show(b.dataset.tab));
show(localStorage.getItem('tab')||'car');

function save(){localStorage.setItem(KEY,JSON.stringify(data));render();}

function saveCar(){
data.car={brand:brand.value,model:model.value,startKm:+startKm.value};
save();
}

function addFuel(){
data.fuel.push({km:+fuelKm.value,l:+fuelLiters.value,c:+fuelCost.value});
fuelKm.value=fuelLiters.value=fuelCost.value='';
save();
}
function delFuel(i){data.fuel.splice(i,1);save();}

function addService(){
data.service.push({km:+srvKm.value,d:srvDesc.value,c:+srvCost.value});
srvKm.value=srvDesc.value=srvCost.value='';
save();
}
function delService(i){data.service.splice(i,1);save();}

function addOther(){
data.other.push({d:otherDesc.value,c:+otherCost.value});
otherDesc.value=otherCost.value='';
save();
}
function delOther(i){data.other.splice(i,1);save();}

function addRule(){
data.rules.push({n:ruleName.value,km:+ruleKm.value});
ruleName.value=ruleKm.value='';
save();
}

let chart;
function render(){
fuelList.innerHTML=data.fuel.map((f,i)=>`
<div class="card row">${f.km} км • ${f.l} л • ${f.c} ₽
<button class="del" onclick="delFuel(${i})">🗑</button></div>`).join('');

serviceList.innerHTML=data.service.map((s,i)=>`
<div class="card row">${s.km} км • ${s.d} • ${s.c} ₽
<button class="del" onclick="delService(${i})">🗑</button></div>`).join('');

otherList.innerHTML=data.other.map((o,i)=>`
<div class="card row">${o.d} • ${o.c} ₽
<button class="del" onclick="delOther(${i})">🗑</button></div>`).join('');

rulesList.innerHTML=data.rules.map(r=>`
<div class="card">${r.n} — ${r.km} км</div>`).join('');

const fuelSum=data.fuel.reduce((a,b)=>a+b.c,0);
const srvSum=data.service.reduce((a,b)=>a+b.c,0);
const othSum=data.other.reduce((a,b)=>a+b.c,0);

statsText.innerHTML=`Всего расходов: ${fuelSum+srvSum+othSum} ₽`;

if(chart)chart.destroy();
chart=new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{
labels:['Топливо','Сервис','Прочее'],
datasets:[{data:[fuelSum,srvSum,othSum]}]
}
});
}
render();

function exportPDF(){
const img=document.getElementById('chart').toDataURL();
const w=window.open('');
w.document.write(`
<meta charset="utf-8">
<h2>Отчёт по автомобилю</h2>
<p>${data.car.brand||''} ${data.car.model||''}</p>
<img src="${img}" style="width:100%;max-width:400px">
<h3>Топливо</h3>
${data.fuel.map(f=>`${f.km} км — ${f.l} л — ${f.c} ₽`).join('<br>')}
<h3>Сервис</h3>
${data.service.map(s=>`${s.km} км — ${s.d} — ${s.c} ₽`).join('<br>')}
<h3>Прочие расходы</h3>
${data.other.map(o=>`${o.d} — ${o.c} ₽`).join('<br>')}
<script>window.print()</script>
`);
}
</script>

</body>
</html>
