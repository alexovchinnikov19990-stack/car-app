<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Belgee X50</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card h2{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#e5e5e5;
font-size:16px;
}

button:active{
opacity:0.8;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th{
text-align:left;
border-bottom:1px solid #ddd;
padding-bottom:8px;
}

td{
padding:8px 0;
border-bottom:1px solid #eee;
}
</style>

</head>

<body>

<h1>Belgee X50</h1>

<div class="card">

<h2>Топливо</h2>

<input type="date" id="fuelDate">
<input type="number" placeholder="Пробег" id="fuelMileage">
<input type="number" placeholder="Литры" id="fuelLiters">
<input type="number" placeholder="Сумма" id="fuelCost">

<button id="addFuel">Добавить</button>

<table>
<thead>
<tr>
<th>Дата</th>
<th>Пробег</th>
<th>Литры</th>
<th>Сумма</th>
</tr>
</thead>

<tbody id="fuelTable"></tbody>

</table>

</div>


<div class="card">

<h2>Сервис</h2>

<input type="text" placeholder="Работа" id="serviceName">
<input type="number" placeholder="Стоимость" id="serviceCost">

<button id="addService">Добавить</button>

<table>

<thead>
<tr>
<th>Работа</th>
<th>Стоимость</th>
</tr>
</thead>

<tbody id="serviceTable"></tbody>

</table>

</div>


<div class="card">

<h2>Прочее</h2>

<input type="text" placeholder="Описание" id="otherName">
<input type="number" placeholder="Стоимость" id="otherCost">

<button id="addOther">Добавить</button>

<table>

<thead>
<tr>
<th>Описание</th>
<th>Стоимость</th>
</tr>
</thead>

<tbody id="otherTable"></tbody>

</table>

</div>


<script src="state/state.js" defer></script>
<script src="state/storage.js" defer></script>

<script src="domain/validation.js" defer></script>
<script src="domain/fuel.js" defer></script>
<script src="domain/service.js" defer></script>
<script src="domain/other.js" defer></script>
<script src="domain/analytics.js" defer></script>
<script src="domain/backup.js" defer></script>

<script src="app.js" defer></script>

</body>
</html>
