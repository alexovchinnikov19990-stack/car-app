<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мой автомобиль</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system,system-ui;background:#000;color:#fff}
header{display:flex;gap:6px;padding:10px;background:rgba(0,0,0,.9);position:sticky;top:0;z-index:10}
header button{background:#222;color:#fff;border:0;padding:8px 12px;border-radius:10px}
header button.active{background:#4caf50;color:#000}
.section{display:none;min-height:100vh;padding:16px}
.card{background:rgba(0,0,0,.75);padding:14px;border-radius:14px;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:0}
button.add{background:#fff;color:#000;font-weight:600}
.del{background:none;color:#ff5252;font-size:20px}
</style>
</head>

<body>

<header>
  <button data-tab="car">🚗 Авто</button>
  <button data-tab="fuel">⛽ Топливо</button>
  <button data-tab="service">🛠 Сервис</button>
  <button data-tab="other">🧾 Прочее</button>
  <button data-tab="rules">🧩 Регламент</button>
  <button data-tab="stats">📊 Итоги</button>
</header>

<div id="car" class="section">
  <div class="card">
    <input id="brand" placeholder="Марка">
    <input id="model" placeholder="Модель">
    <input id="startKm" type="number" placeholder="Начальный пробег">
    <button id="saveCar" class="add">Сохранить</button>
  </div>
</div>

<div id="fuel" class="section">
  <div class="card">
    <input id="fuelKm" type="number" placeholder="Пробег">
    <input id="fuelLiters" type="number" placeholder="Литры">
    <input id="fuelCost" type="number" placeholder="Стоимость">
    <button id="addFuel" class="add">Добавить</button>
  </div>
  <div id="fuelList"></div>
</div>

<div id="service" class="section">
  <div class="card">
    <input id="srvKm" type="number" placeholder="Пробег">
    <input id="srvDesc" placeholder="Описание работ">
    <input id="srvCost" type="number" placeholder="Стоимость">
    <button id="addService" class="add">Добавить</button>
  </div>
  <div id="serviceList"></div>
</div>

<div id="other" class="section">
  <div class="card">
    <input id="otherDesc" placeholder="Описание">
    <input id="otherCost" type="number" placeholder="Стоимость">
    <button id="addOther" class="add">Добавить</button>
  </div>
  <div id="otherList"></div>
</div>

<div id="rules" class="section">
  <div class="card">
    <input id="ruleName" placeholder="Узел">
    <input id="ruleKm" type="number" placeholder="Интервал, км">
    <button id="addRule" class="add">Добавить</button>
  </div>
  <div id="rulesList"></div>
</div>

<div id="stats" class="section">
  <div class="card">
    <canvas id="chart"></canvas>
    <div id="statsText"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const KEY = 'carAppStableV1';
  const data = JSON.parse(localStorage.getItem(KEY)) || {
    car:{}, fuel:[], service:[], other:[], rules:[]
  };

  const sections = document.querySelectorAll('.section');
  const tabs = document.querySelectorAll('[data-tab]');

  function show(tab){
    sections.forEach(s => s.style.display = s.id === tab ? 'block' : 'none');
    tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    localStorage.setItem('activeTab', tab);
  }

  tabs.forEach(b => b.addEventListener('click', () => show(b.dataset.tab)));
  show(localStorage.getItem('activeTab') || 'car');

  const brand = document.getElementById('brand');
  const model = document.getElementById('model');
  const startKm = document.getElementById('startKm');

  if(data.car){
    brand.value = data.car.brand || '';
    model.value = data.car.model || '';
    startKm.value = data.car.startKm || '';
  }

  document.getElementById('saveCar').onclick = () => {
    data.car = {
      brand: brand.value,
      model: model.value,
      startKm: startKm.value
    };
    save();
  };

  function save(){
    localStorage.setItem(KEY, JSON.stringify(data));
    render();
  }

  function render(){
    document.getElementById('fuelList').innerHTML =
      data.fuel.map((f,i)=>`<div class="card row">${f.km} км • ${f.l} л • ${f.c} ₽
      <button class="del" onclick="delFuel(${i})">🗑</button></div>`).join('');

    document.getElementById('serviceList').innerHTML =
      data.service.map((s,i)=>`<div class="card row">${s.km} км • ${s.d} • ${s.c} ₽
      <button class="del" onclick="delService(${i})">🗑</button></div>`).join('');

    document.getElementById('otherList').innerHTML =
      data.other.map((o,i)=>`<div class="card row">${o.d} • ${o.c} ₽
      <button class="del" onclick="delOther(${i})">🗑</button></div>`).join('');

    document.getElementById('rulesList').innerHTML =
      data.rules.map(r=>`<div class="card">${r.n} — ${r.km} км</div>`).join('');
  }

  window.delFuel = i => { data.fuel.splice(i,1); save(); };
  window.delService = i => { data.service.splice(i,1); save(); };
  window.delOther = i => { data.other.splice(i,1); save(); };

  document.getElementById('addFuel').onclick = () => {
    data.fuel.push({km:fuelKm.value,l:fuelLiters.value,c:fuelCost.value});
    fuelKm.value=fuelLiters.value=fuelCost.value='';
    save();
  };

  document.getElementById('addService').onclick = () => {
    data.service.push({km:srvKm.value,d:srvDesc.value,c:srvCost.value});
    srvKm.value=srvDesc.value=srvCost.value='';
    save();
  };

  document.getElementById('addOther').onclick = () => {
    data.other.push({d:otherDesc.value,c:otherCost.value});
    otherDesc.value=otherCost.value='';
    save();
  };

  document.getElementById('addRule').onclick = () => {
    data.rules.push({n:ruleName.value,km:ruleKm.value});
    ruleName.value=ruleKm.value='';
    save();
  };

  render();
});
</script>

</body>
</html>
