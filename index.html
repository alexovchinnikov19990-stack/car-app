<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Belgee X50</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: system-ui;
max-width: 900px;
margin:auto;
padding:20px;
}

input{
padding:10px;
margin:4px;
}

button{
padding:10px;
margin:5px;
}

table{
width:100%;
margin-top:10px;
border-collapse: collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #ddd;
text-align:center;
}
</style>
</head>

<body>

<h1>Belgee X50</h1>

<button onclick="createBackup()">Создать бэкап</button>
<input type="file" id="restoreFile">

<h2>Топливо</h2>

<input type="date" id="date">
<input type="number" id="odo" placeholder="Пробег (км)">
<input type="number" id="liters" placeholder="Литры">
<input type="number" id="sum" placeholder="Сумма">

<button onclick="addFuel()">Добавить</button>

<table>
<thead>
<tr>
<th>Дата</th>
<th>Пробег</th>
<th>Литры</th>
<th>Сумма</th>
<th>Цена/л</th>
<th>Расход</th>
<th></th>
</tr>
</thead>
<tbody id="fuelTable"></tbody>
</table>

<h2>Итоги</h2>

<p>Топливо: <span id="fuelTotal"></span></p>
<p>Всего: <span id="total"></span></p>
<p>Средний расход: <span id="avg"></span></p>
<p>Стоимость 1 км: <span id="costkm"></span></p>

<h2>Аналитика</h2>

<canvas id="consChart"></canvas>
<canvas id="costChart"></canvas>
<canvas id="odoChart"></canvas>

<script type="module" src="./app.js"></script>

</body>
</html>
