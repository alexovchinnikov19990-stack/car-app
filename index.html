<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
}

.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.tab {
  padding: 10px 14px;
  background: #222;
  border-radius: 12px;
  cursor: pointer;
  white-space: nowrap;
}

.tab.active {
  background: #4caf50;
  color: #000;
}

.section {
  display: none;
  padding: 15px;
}

.section.active {
  display: block;
}

input, textarea, button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #4caf50;
  font-weight: bold;
}

.list-item {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  margin: 6px 0;
}

canvas {
  background: #fff;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="tabs" id="tabs"></div>

<!-- АВТО -->
<div id="auto" class="section active">
  <input id="carName" placeholder="Автомобиль">
  <input id="mileage" placeholder="Пробег" type="number">
  <button id="saveAuto">Сохранить</button>
</div>

<!-- ТОПЛИВО -->
<div id="fuel" class="section">
  <input id="fuelKm" placeholder="Пробег" type="number">
  <input id="fuelLiters" placeholder="Литры" type="number">
  <input id="fuelCost" placeholder="Стоимость" type="number">
  <button id="addFuel">Добавить</button>
  <div id="fuelList"></div>
</div>

<!-- СЕРВИС -->
<div id="service" class="section">
  <input id="serviceKm" placeholder="Пробег" type="number">
  <input id="serviceDesc" placeholder="Описание работ">
  <input id="serviceCost" placeholder="Стоимость" type="number">
  <button id="addService">Добавить</button>
  <div id="serviceList"></div>
</div>

<!-- ПРОЧЕЕ -->
<div id="other" class="section">
  <input id="otherKm" placeholder="Пробег" type="number">
  <input id="otherDesc" placeholder="Описание расхода">
  <input id="otherCost" placeholder="Стоимость" type="number">
  <button id="addOther">Добавить</button>
  <div id="otherList"></div>
</div>

<!-- РЕГЛАМЕНТ -->
<div id="reglament" class="section">
  <textarea id="regText" placeholder="Регламент работ" rows="8"></textarea>
  <button id="saveReg">Сохранить</button>
</div>

<!-- ИТОГИ -->
<div id="summary" class="section">
  <canvas id="chart"></canvas>
  <button id="exportPdf">Выгрузить PDF</button>
</div>

<script>
/* ------------------ STATE ------------------ */
const state = JSON.parse(localStorage.getItem('carApp')) || {
  auto: {},
  fuel: [],
  service: [],
  other: [],
  reglament: ''
};

/* ------------------ TABS ------------------ */
const tabs = [
  {id:'auto', label:'🚗 Авто'},
  {id:'fuel', label:'⛽ Топливо'},
  {id:'service', label:'🔧 Сервис'},
  {id:'other', label:'🧾 Прочее'},
  {id:'reglament', label:'🧩 Регламент'},
  {id:'summary', label:'📊 Итоги'}
];

const tabsEl = document.getElementById('tabs');

tabs.forEach(t => {
  const el = document.createElement('div');
  el.className = 'tab';
  el.textContent = t.label;
  el.onclick = () => showSection(t.id, el);
  tabsEl.appendChild(el);
});

function showSection(id, tabEl) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tabEl.classList.add('active');
  render();
}

/* ------------------ SAVE ------------------ */
function save() {
  localStorage.setItem('carApp', JSON.stringify(state));
}

/* ------------------ AUTO ------------------ */
document.getElementById('saveAuto').onclick = () => {
  state.auto = {
    name: carName.value,
    mileage: mileage.value
  };
  save();
};

/* ------------------ FUEL ------------------ */
document.getElementById('addFuel').onclick = () => {
  state.fuel.push({
    km: fuelKm.value,
    l: fuelLiters.value,
    c: fuelCost.value
  });
  save(); render();
};

/* ------------------ SERVICE ------------------ */
document.getElementById('addService').onclick = () => {
  state.service.push({
    km: serviceKm.value,
    d: serviceDesc.value,
    c: serviceCost.value
  });
  save(); render();
};

/* ------------------ OTHER ------------------ */
document.getElementById('addOther').onclick = () => {
  state.other.push({
    km: otherKm.value,
    d: otherDesc.value,
    c: otherCost.value
  });
  save(); render();
};

/* ------------------ REG ------------------ */
document.getElementById('saveReg').onclick = () => {
  state.reglament = regText.value;
  save();
};

/* ------------------ RENDER ------------------ */
function render() {
  fuelList.innerHTML = state.fuel.map(f =>
    `<div class="list-item">${f.km} км · ${f.l} л · ${f.c} ₽</div>`
  ).join('');

  serviceList.innerHTML = state.service.map(s =>
    `<div class="list-item">${s.km} км · ${s.d} · ${s.c} ₽</div>`
  ).join('');

  otherList.innerHTML = state.other.map(o =>
    `<div class="list-item">${o.km} км · ${o.d} · ${o.c} ₽</div>`
  ).join('');

  regText.value = state.reglament;

  drawChart();
}

/* ------------------ CHART ------------------ */
let chart;
function sum(arr) {
  return arr.reduce((a,b) => a + Number(b.c || 0), 0);
}

function drawChart() {
  const ctx = document.getElementById('chart');
  if (!ctx) return;
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Топливо', 'Сервис', 'Прочее'],
      datasets: [{
        data: [
          sum(state.fuel),
          sum(state.service),
          sum(state.other)
        ]
      }]
    }
  });
}

/* ------------------ PDF ------------------ */
document.getElementById('exportPdf').onclick = () => {
  html2pdf().from(document.body).save('car-report.pdf');
};

render();
</script>

</body>
</html>
