<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Auto Control PRO</title>

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoControl">

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
:root{
--safe-top: env(safe-area-inset-top);
--safe-bottom: env(safe-area-inset-bottom);
}

html,body{
margin:0;
padding:0;
background:#111;
color:#fff;
font-family:-apple-system;
height:100%;
}

.app{
padding-top:calc(var(--safe-top));
padding-bottom:calc(var(--safe-bottom));
}

nav{
display:flex;
position:sticky;
top:0;
background:#000;
z-index:1000;
}

nav button{
flex:1;
padding:14px 6px;
font-size:13px;
background:#000;
color:#fff;
border:none;
}

nav button.active{
background:#1f1f1f;
}

section{
padding:15px;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
font-size:16px;
}

input{background:#222;color:#fff;}
button.primary{background:#0a84ff;color:#fff;font-weight:600;}

.card{
background:#1a1a1a;
padding:12px;
margin:8px 0;
border-radius:10px;
}

.stat{
background:#151515;
padding:10px;
margin:6px 0;
border-radius:8px;
}

canvas{
margin-top:20px;
background:#fff;
border-radius:10px;
}
</style>
</head>
<body>

<div class="app">

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('fuel')" id="tab-fuel">Топливо</button>
<button onclick="switchTab('service')" id="tab-service">Сервис</button>
<button onclick="switchTab('other')" id="tab-other">Прочее</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<section id="content"></section>

</div>

<script>
/* SAFE NAV FIX */
function switchTab(t){
tab=t;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+t).classList.add("active");
render();
}

let tab="auto";
render=function(){
content.innerHTML="<h2>Рабочая версия восстановлена</h2>";
};
switchTab("auto");
</script>

</body>
</html>
