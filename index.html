<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Belgee X50</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
padding:0;
}

header{
background:black;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}

nav button{
background:#333;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

button{
padding:10px 16px;
border-radius:10px;
border:none;
background:#444;
color:white;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #333;
}

</style>

</head>
<body>

<header>Belgee X50</header>

<nav>

<button onclick="openTab('fuel')">Топливо</button>
<button onclick="openTab('service')">Сервис</button>
<button onclick="openTab('other')">Прочее</button>
<button onclick="openTab('stats')">Итоги</button>
<button onclick="openTab('car')">Авто</button>

</nav>

<!-- ТОПЛИВО -->

<section id="fuel" class="active">

<h2>Топливо</h2>

<input id="fuelDate" type="date">

<input id="fuelKm" placeholder="Пробег">

<input id="fuelLiters" placeholder="Литры">

<input id="fuelPrice" placeholder="Сумма">

<button onclick="addFuel()">Добавить</button>

<table id="fuelTable">

<thead>

<tr>

<th>Дата</th>
<th>Км</th>
<th>Литры</th>
<th>Сумма</th>
<th>Цена/л</th>
<th>Расход</th>
<th></th>

</tr>

</thead>

<tbody></tbody>

</table>

</section>

<!-- СЕРВИС -->

<section id="service">

<h2>Сервис</h2>

<input id="serviceName" placeholder="Работа">

<input id="servicePrice" placeholder="Стоимость">

<button onclick="addService()">Добавить</button>

<ul id="serviceList"></ul>

</section>

<!-- ПРОЧЕЕ -->

<section id="other">

<h2>Прочее</h2>

<input id="otherName" placeholder="Расход">

<input id="otherPrice" placeholder="Стоимость">

<button onclick="addOther()">Добавить</button>

<ul id="otherList"></ul>

</section>

<!-- ИТОГИ -->

<section id="stats">

<h2>Итоги</h2>

<p>Топливо: <span id="fuelTotal">0</span></p>

<p>Сервис: <span id="serviceTotal">0</span></p>

<p>Прочее: <span id="otherTotal">0</span></p>

<p><b>Всего: <span id="allTotal">0</span></b></p>

<p>Средний расход: <span id="avg">0</span></p>

<p>Стоимость 1 км: <span id="kmCost">0</span></p>

<h2>Аналитика</h2>

<canvas id="chartFuel"></canvas>

</section>

<!-- АВТО -->

<section id="car">

<h2>Авто</h2>

<p>Модель: Belgee X50</p>

<h3>Backup</h3>

<button onclick="downloadBackup()">Скачать backup</button>

<br><br>

<input type="file" id="backupFile">

<br><br>

<button onclick="restoreBackup()">Восстановить backup</button>

</section>


<!-- JS ФАЙЛЫ (ВАЖЕН ПОРЯДОК) -->

<script src="state.js"></script>
<script src="storage.js"></script>

<script src="domain/fuel.js"></script>
<script src="domain/service.js"></script>
<script src="domain/other.js"></script>
<script src="domain/analytics.js"></script>

<script src="charts.js"></script>
<script src="app.js"></script>

</body>
</html>
