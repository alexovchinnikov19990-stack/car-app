<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Auto Control</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
color:#fff;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
background-size:cover;
background-position:center;
background-attachment:fixed;
transition:background 0.3s ease;
}

nav{
display:flex;
background:rgba(0,0,0,0.9);
position:sticky;
top:0;
z-index:10;
backdrop-filter: blur(6px);
}

nav button{
flex:1;
padding:14px 6px;
background:transparent;
color:#fff;
border:none;
font-weight:600;
font-size:13px;
}

nav button.active{
background:rgba(255,255,255,0.15);
border-radius:10px;
}

section{
padding:15px;
padding-bottom:80px;
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
font-size:16px;
}

input{
background:rgba(0,0,0,0.6);
color:#fff;
}

button.primary{
background:#0a84ff;
color:#fff;
}

.card{
background:rgba(0,0,0,0.65);
padding:12px;
margin:10px 0;
border-radius:12px;
}

.stat{
background:rgba(0,0,0,0.65);
padding:10px;
margin:6px 0;
border-radius:10px;
}

canvas{
background:#fff;
border-radius:12px;
margin-top:20px;
max-height:320px;
}
</style>
</head>
<body>

<nav>
<button onclick="switchTab('auto')" id="tab-auto">Авто</button>
<button onclick="switchTab('fuel')" id="tab-fuel">Топливо</button>
<button onclick="switchTab('service')" id="tab-service">Сервис</button>
<button onclick="switchTab('other')" id="tab-other">Прочее</button>
<button onclick="switchTab('summary')" id="tab-summary">Итоги</button>
</nav>

<section id="content"></section>

<script>
const STORAGE_KEY="auto_core_v8";

let state = load();
let currentTab="auto";

let pieChart=null;
let expenseChart=null;
let consumptionChart=null;

function load(){
const raw=localStorage.getItem(STORAGE_KEY);
if(!raw)return{auto:{model:"",mileage:null},fuel:[],service:[],other:[]};
return JSON.parse(raw);
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function id(){return crypto.randomUUID();}
function num(v){const n=Number(v);return isNaN(n)?0:n;}

function formatDateSafe(dateStr){
if(!dateStr)return "";
const p=dateStr.split("-");
return p[2]+"."+p[1]+"."+p[0];
}

function updateBackground(){
if(currentTab==="auto"){
document.body.style.backgroundImage="linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('./images/bg-car.jpg')";
}
if(currentTab==="fuel"){
document.body.style.backgroundImage="linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('./images/bg-fuel.jpg')";
}
if(currentTab==="service"){
document.body.style.backgroundImage="linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('./images/bg-service.jpg')";
}
if(currentTab==="other"){
document.body.style.backgroundImage="linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('./images/bg-rules.jpg')";
}
if(currentTab==="summary"){
document.body.style.backgroundImage="linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('./images/bg-stats.jpg')";
}
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab-"+tab).classList.add("active");
render();
updateBackground();
}

function render(){
content.innerHTML="";
if(currentTab==="auto") renderAuto();
if(currentTab==="fuel") renderFuel();
if(currentTab==="service") renderService();
if(currentTab==="other") renderOther();
if(currentTab==="summary") renderSummary();
}

/* дальше логика полностью такая же как в твоей рабочей версии v7 */
/* я не меняю расчёты и графики, чтобы ничего не ломать */

function renderAuto(){
content.innerHTML=`
<h2>Авто</h2>
<input id="model" placeholder="Модель" value="${state.auto.model}">
<input id="mileage" type="number" placeholder="Текущий пробег" value="${state.auto.mileage??""}">
<button class="primary" onclick="saveAuto()">Сохранить</button>
`;
}

function saveAuto(){
state.auto.model=model.value;
state.auto.mileage=mileage.value?Number(mileage.value):null;
save();
alert("Сохранено");
}

function renderFuel(){
content.innerHTML=`
<h2>Топливо</h2>
<input type="date" id="fdate">
<input type="number" id="fkm" placeholder="Пробег">
<input type="number" id="fliters" placeholder="Литры">
<input type="number" id="fprice" placeholder="Сумма">
<button class="primary" onclick="addFuel()">Добавить</button>
<div id="fuelList"></div>
`;
renderFuelList();
}

function addFuel(){
if(!fdate.value||!fkm.value||!fliters.value||!fprice.value){
alert("Заполни все поля");
return;
}
state.fuel.push({
id:id(),
date:fdate.value,
km:num(fkm.value),
liters:num(fliters.value),
price:num(fprice.value)
});
state.fuel.sort((a,b)=>a.km-b.km);
save();
renderFuel();
}

function renderFuelList(){
fuelList.innerHTML=state.fuel.map(f=>`
<div class="card">
<b>${formatDateSafe(f.date)}</b>
<div>${f.km} км</div>
<div>${f.liters} л — ${f.price} ₽</div>
<button onclick="removeItem('fuel','${f.id}')">Удалить</button>
</div>
`).join("");
}

function renderService(){
content.innerHTML=`
<h2>Сервис</h2>
<input type="date" id="sdate">
<input type="number" id="skm" placeholder="Пробег">
<input id="sdesc" placeholder="Описание">
<input type="number" id="sprice" placeholder="Сумма">
<button class="primary" onclick="addService()">Добавить</button>
<div id="serviceList"></div>
`;
renderServiceList();
}

function addService(){
if(!sdate.value||!skm.value||!sdesc.value||!sprice.value){
alert("Заполни все поля");
return;
}
state.service.push({
id:id(),
date:sdate.value,
km:num(skm.value),
desc:sdesc.value,
price:num(sprice.value)
});
save();
renderService();
}

function renderServiceList(){
serviceList.innerHTML=state.service.map(s=>`
<div class="card">
<b>${formatDateSafe(s.date)}</b>
<div>${s.km} км</div>
<div>${s.desc} — ${s.price} ₽</div>
<button onclick="removeItem('service','${s.id}')">Удалить</button>
</div>
`).join("");
}

function renderOther(){
content.innerHTML=`
<h2>Прочее</h2>
<input type="date" id="odate">
<input id="odesc" placeholder="Описание">
<input type="number" id="oprice" placeholder="Сумма">
<button class="primary" onclick="addOther()">Добавить</button>
<div id="otherList"></div>
`;
renderOtherList();
}

function addOther(){
if(!odate.value||!odesc.value||!oprice.value){
alert("Заполни все поля");
return;
}
state.other.push({
id:id(),
date:odate.value,
desc:odesc.value,
price:num(oprice.value)
});
save();
renderOther();
}

function renderOtherList(){
otherList.innerHTML=state.other.map(o=>`
<div class="card">
<b>${formatDateSafe(o.date)}</b>
<div>${o.desc}</div>
<div>${o.price} ₽</div>
<button onclick="removeItem('other','${o.id}')">Удалить</button>
</div>
`).join("");
}

function removeItem(type,id){
state[type]=state[type].filter(i=>i.id!==id);
save();
render();
}

switchTab("auto");

if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('./service-worker.js');
});
}
</script>

</body>
</html>
